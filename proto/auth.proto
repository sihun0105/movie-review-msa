syntax = "proto3";

import "user.proto";

package auth;

option go_package = "auth";

service AuthService {
    rpc LoginUser (LoginUserDto) returns (user.User) {}
    rpc OauthLogin (OauthLoginDto) returns (user.User) {}
    rpc ValidateEmail (ValidateEmailDto) returns (ValidationResponse) {}
    rpc ValidateNickname (ValidateNicknameDto) returns (ValidationResponse) {}
    rpc SendVerificationCode (SendVerificationCodeDto) returns (CommonResponse) {}
    rpc VerifyCode (VerifyCodeDto) returns (ValidationResponse) {}
    rpc ForgotPassword (ForgotPasswordDto) returns (CommonResponse) {}
    rpc ResetPassword (ResetPasswordDto) returns (CommonResponse) {}
}

message LoginUserDto {
    string email = 1;
    string password = 2;
}

message OauthLoginDto {
    string provider = 1;
    string providerId = 2;
}

message ValidateEmailDto {
    string email = 1;
}

message ValidateNicknameDto {
    string nickname = 1;
}

message ValidationResponse {
    bool isAvailable = 1;
    string message = 2;
}

message SendVerificationCodeDto {
    string email = 1;
}

message VerifyCodeDto {
    string email = 1;
    string code = 2;
}

message ForgotPasswordDto {
    string email = 1;
}

message ResetPasswordDto {
    string token = 1;
    string newPassword = 2;
}

message CommonResponse {
    bool success = 1;
    string message = 2;
}
